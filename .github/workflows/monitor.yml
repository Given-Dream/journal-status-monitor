name: 期刊状态监控

on:
  schedule:
    # 每天北京时间 9:00 (UTC 1:00) - 发送每日报告
    - cron: '0 1 * * *'
    # 每天北京时间 13:00 (UTC 5:00) - 仅在状态变化时发送通知
    - cron: '0 5 * * *'
    # 每天北京时间 22:00 (UTC 14:00) - 仅在状态变化时发送通知
    - cron: '0 14 * * *'
  
  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        required: true
        default: 'normal'
        type: choice
        options:
          - normal
          - test
          - daily_report

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write # 必须开启 actions 写权限才能删除运行记录
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 获取完整历史以支持清理逻辑
      
      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install selenium webdriver-manager
      
      - name: 执行监控任务
        env:
          IEEE_EMAIL: ${{ secrets.IEEE_EMAIL }}
          IEEE_PASSWORD: ${{ secrets.IEEE_PASSWORD }}
          ELSEVIER_EMAIL: ${{ secrets.ELSEVIER_EMAIL }}
          ELSEVIER_PASSWORD: ${{ secrets.ELSEVIER_PASSWORD }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
        run: |
          # 根据触发方式设置运行模式
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ github.event.inputs.mode }}" = "daily_report" ]; then
              export DAILY_REPORT=true
            else
              export DAILY_REPORT=false
            fi
            python monitor.py
          elif [ "${{ github.event.schedule }}" = "0 1 * * *" ]; then
            echo "📊 定时任务：发送每日报告"
            export DAILY_REPORT=true
            python monitor.py
          else
            echo "🔍 定时任务：只在状态变化时发送邮件"
            export DAILY_REPORT=false
            python monitor.py
          fi
      
      - name: 提交数据和时间线文件
        if: always()
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          mkdir -p data
          git add data/manuscripts.json data/timeline_*.txt || true
          if git diff --staged --quiet; then
            echo "ℹ️ 数据无变化"
          else
            git commit -m "Update manuscript data and timelines [skip ci]"
            git push
            echo "✅ 数据已同步到仓库"
          fi

      - name: 清理旧的工作流运行记录
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'monitor.yml',
              per_page: 100
            });
            
            // 保留最近的 7 次运行，删除其余的
            const runsToDelete = runs.data.workflow_runs.slice(7);
            
            for (const run of runsToDelete) {
              await github.rest.actions.deleteWorkflowRun({
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: run.id
              });
              console.log(`Deleted run ID: ${run.id}`);
            }
