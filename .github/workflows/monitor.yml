name: Journal Status Monitor

on:
  schedule:
    - cron: '17,27,37 0 * * *'
    - cron: '17,27,37 4 * * *'
    - cron: '17 14 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: Run mode
        required: true
        default: normal
        type: choice
        options:
          - normal
          - test
          - daily_report

concurrency:
  group: journal-status-monitor
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Resolve run mode
        id: mode
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "17,27,37 0 * * *" ]; then
            echo "mode=daily_report" >> "$GITHUB_OUTPUT"
          else
            echo "mode=normal" >> "$GITHUB_OUTPUT"
          fi

      - name: Run monitor
        env:
          IEEE_EMAIL: ${{ secrets.IEEE_EMAIL }}
          IEEE_PASSWORD: ${{ secrets.IEEE_PASSWORD }}
          IEEE_URL: ${{ secrets.IEEE_URL }}
          ELSEVIER_EMAIL: ${{ secrets.ELSEVIER_EMAIL }}
          ELSEVIER_PASSWORD: ${{ secrets.ELSEVIER_PASSWORD }}
          ELSEVIER_URL: ${{ secrets.ELSEVIER_URL }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          DATA_FILE: data/manuscripts.json
          HEADLESS: 'true'
          SAVE_DEBUG_ARTIFACTS: 'true'
          FAIL_ON_EMPTY: 'false'
        run: python monitor.py --mode "${{ steps.mode.outputs.mode }}"

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monitor-debug
          path: debug/
          if-no-files-found: ignore
          retention-days: 7

      - name: Commit data changes
        if: always()
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          mkdir -p data
          git add -f data/manuscripts.json data/manuscripts.meta.json || true
          if git diff --staged --quiet; then
            echo "No data changes."
          else
            git commit -m "Update manuscript data [skip ci]"
            git push
          fi

      - name: Delete old workflow runs
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'monitor.yml',
              per_page: 100
            });
            for (const run of runs.data.workflow_runs.slice(20)) {
              await github.rest.actions.deleteWorkflowRun({
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: run.id
              });
            }
