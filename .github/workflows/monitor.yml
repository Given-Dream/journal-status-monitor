name: Journal Status Monitor
run-name: Journal Status Monitor (${{ inputs.mode || 'manual' }} window=${{ inputs.window || 'manual' }})

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Run mode
        required: true
        default: normal
        type: choice
        options:
          - normal
          - test
          - daily_report
      window:
        description: Beijing trigger window, for fallback dedupe
        required: false
        default: manual

concurrency:
  group: journal-status-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout repository
        shell: bash
        run: |
          set -e
          branch="${GITHUB_REF_NAME:-main}"
          git init .
          git remote add origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
          git fetch --depth=1 origin "$branch"
          git checkout -B "$branch" FETCH_HEAD

      - name: Check Python
        shell: bash
        run: |
          set -e
          python3 --version
          python3 -m venv --help >/dev/null

      - name: Check Chrome
        shell: bash
        run: |
          set -e
          if command -v google-chrome >/dev/null 2>&1; then
            google-chrome --version
          elif command -v google-chrome-stable >/dev/null 2>&1; then
            google-chrome-stable --version
          elif command -v chromium-browser >/dev/null 2>&1; then
            chromium-browser --version
          elif command -v chromium >/dev/null 2>&1; then
            chromium --version
          else
            echo "Chrome/Chromium is not available on this runner." >&2
            exit 1
          fi

      - name: Install dependencies
        shell: bash
        run: |
          set -e
          python3 -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install --retries 5 --timeout 60 -r requirements.txt

      - name: Resolve run mode
        id: mode
        shell: bash
        run: |
          echo "mode=${{ github.event.inputs.mode }}" >> "$GITHUB_OUTPUT"
          echo "window=${{ github.event.inputs.window }}" >> "$GITHUB_OUTPUT"
          echo "Trigger window: ${{ github.event.inputs.window }}"

      - name: Run monitor
        env:
          IEEE_EMAIL: ${{ secrets.IEEE_EMAIL }}
          IEEE_PASSWORD: ${{ secrets.IEEE_PASSWORD }}
          IEEE_URL: ${{ secrets.IEEE_URL }}
          ELSEVIER_EMAIL: ${{ secrets.ELSEVIER_EMAIL }}
          ELSEVIER_PASSWORD: ${{ secrets.ELSEVIER_PASSWORD }}
          ELSEVIER_URL: ${{ secrets.ELSEVIER_URL }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          DATA_FILE: data/manuscripts.json
          HEADLESS: 'true'
          SAVE_DEBUG_ARTIFACTS: 'true'
          FAIL_ON_EMPTY: 'false'
        shell: bash
        run: |
          set -e
          . .venv/bin/activate
          python monitor.py --mode "${{ steps.mode.outputs.mode }}"

      - name: List debug files
        if: always()
        shell: bash
        run: |
          if [ -d debug ]; then
            find debug -maxdepth 2 -type f -print | sort
          else
            echo "No debug directory."
          fi

      - name: Commit data changes
        if: always()
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          mkdir -p data
          if [ -f data/manuscripts.json ]; then
            git add -f data/manuscripts.json
          fi
          if [ -f data/manuscripts.meta.json ]; then
            git add -f data/manuscripts.meta.json
          fi
          if git diff --staged --quiet; then
            echo "No data changes."
          else
            git commit -m "Update manuscript data [skip ci]"
            branch="${GITHUB_REF_NAME:-main}"
            git push origin "HEAD:$branch"
          fi

      - name: Delete old workflow runs
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.request

          owner, repo = os.environ["GITHUB_REPOSITORY"].split("/", 1)
          token = os.environ["GH_TOKEN"]
          headers = {
              "Accept": "application/vnd.github+json",
              "Authorization": f"Bearer {token}",
              "X-GitHub-Api-Version": "2022-11-28",
              "User-Agent": "journal-status-monitor",
          }

          def request(method, url):
              req = urllib.request.Request(url, headers=headers, method=method)
              return urllib.request.urlopen(req, timeout=30)

          url = f"https://api.github.com/repos/{owner}/{repo}/actions/workflows/monitor.yml/runs?per_page=100"
          try:
              with request("GET", url) as response:
                  runs = json.load(response).get("workflow_runs", [])
          except Exception as exc:
              print(f"Skip workflow cleanup: {exc}")
              raise SystemExit(0)

          for run in runs[20:]:
              run_id = run.get("id")
              if not run_id:
                  continue
              delete_url = f"https://api.github.com/repos/{owner}/{repo}/actions/runs/{run_id}"
              try:
                  with request("DELETE", delete_url):
                      print(f"Deleted old workflow run {run_id}")
              except urllib.error.HTTPError as exc:
                  print(f"Could not delete workflow run {run_id}: HTTP {exc.code}")
              except Exception as exc:
                  print(f"Could not delete workflow run {run_id}: {exc}")
          PY
